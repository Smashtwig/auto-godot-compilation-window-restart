name: Build Godot Secure
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_templates:
    runs-on: ubuntu-latest

    env:
      SCONSFLAGS: verbose=yes warnings=all use_lto=yes
      SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.SCRIPT_AES256_ENCRYPTION_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone latest Godot source
        run: |
          TAG=$(curl -s https://api.github.com/repos/godotengine/godot/releases/latest | grep tag_name | cut -d '"' -f4)
          git clone --depth 1 --branch $TAG https://github.com/godotengine/godot.git godot

      - name: Run Headless Encryption Script
        run: |
          # This runs YOUR version of the script which is already in your repo
          python3 "Godot Secure AES-256.py" ./godot

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config python3 \
               mingw-w64 clang zip unzip curl git cmake
          # Setting up the Windows cross-compiler
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      # --- LINUX BUILDS ---
      - name: Build Linux export templates
        run: |
          cd godot
          scons platform=linuxbsd target=template_release tools=no
          cd ..

      # --- WINDOWS BUILDS ---
      - name: Build Windows export templates
        run: |
          cd godot
          scons platform=windows target=template_release arch=x86_64 tools=no d3d12=no
          cd ..

      - name: Build Windows Editor (CRITICAL for Exporting)
        run: |
          cd godot
          scons platform=windows target=editor arch=x86_64 tools=yes d3d12=no
          cd ..

      # --- PACKAGING AND UPLOADING ---
      - name: Package Linux templates
        run: |
          mkdir -p templates_linux
          cp godot/bin/*linuxbsd* templates_linux/
          (cd templates_linux && zip -9 -r ../export_templates_linux.zip .)

      - name: Package Windows templates & Editor
        run: |
          mkdir -p templates_windows
          cp godot/bin/*windows* templates_windows/
          (cd templates_windows && zip -9 -r ../export_templates_windows.zip .)

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-templates
          path: export_templates_linux.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-templates-and-editor
          path: export_templates_windows.zip
