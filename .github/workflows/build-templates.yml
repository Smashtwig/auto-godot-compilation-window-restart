name: Build Export Templates (Single Job)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_templates:
    runs-on: ubuntu-latest

    env:
      SCONSFLAGS: verbose=yes warnings=all use_lto=yes
      SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.SCRIPT_AES256_ENCRYPTION_KEY }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Clone latest Godot source
        run: |
          TAG=$(curl -s https://api.github.com/repos/godotengine/godot/releases/latest | grep tag_name | cut -d '"' -f4)
          echo "Latest Godot version: $TAG"
          git clone --depth 1 --branch $TAG https://github.com/godotengine/godot.git godot

      - name: Run encryption script
        run: |
          export SCRIPT_AES256_ENCRYPTION_KEY=$SCRIPT_AES256_ENCRYPTION_KEY
          python3 "Godot Secure AES-256.py" ./godot <<EOF
          y
          n
          n
          EOF

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config python3 \
               mingw-w64 clang zip unzip curl git cmake
          sudo update-alternatives --install /usr/bin/x86_64-w64-mingw32-g++ \
            x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix 100
          sudo update-alternatives --install /usr/bin/x86_64-w64-mingw32-gcc \
            x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix 100
          sudo update-alternatives --set x86_64-w64-mingw32-g++ \
            /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc \
            /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Cache SCons build artifacts
        uses: actions/cache@v3
        with:
          path: |
            godot/.sconsign.dblite
            godot/bin/
          key: ${{ runner.os }}-godot-${{ hashFiles('godot/**/*.cpp', 'godot/**/*.h', 'godot/SConstruct', 'godot/SCsub') }}
          restore-keys: |
            ${{ runner.os }}-godot-

      - name: Build Linux export templates
        run: |
          cd godot
          scons platform=linuxbsd target=template_release tools=no
          cd ..


      - name: Build Windows export templates
        run: |
          cd godot
          scons platform=windows target=template_release arch=x86_64 tools=no d3d12=no
          scons platform=windows target=editor arch=x86_64 tools=yes d3d12=no
          cd ..


      - name: Package Linux templates
        run: |
          mkdir templates_linux
          cp godot/bin/*linuxbsd* templates_linux/
          cd templates_linux
          zip -9 -r ../export_templates_linux.zip .
          cd ..


      - name: Package Windows templates (robust)
        run: |
          set -e
      
          mkdir -p templates_windows
      
          echo "🔍 Searching for Windows build outputs..."
          FILES=$(find godot -type f -iname "godot.windows*.exe")
      
          if [ -z "$FILES" ]; then
            echo "❌ No Windows binaries found. Build likely failed."
            echo "Dumping bin directory for debugging:"
            ls -R godot/bin/ || true
            exit 1
          fi
      
          echo "✅ Found files:"
          echo "$FILES"
      
          # Copy all matching binaries
          for f in $FILES; do
            cp "$f" templates_windows/
          done
      
          echo "📦 Packaging..."
          cd templates_windows
          zip -9 -r ../export_templates_windows.zip .
          cd ..
      
          echo "✅ Packaging complete"


      - name: Upload Linux templates
        uses: actions/upload-artifact@v4
        with:
          name: linux-templates
          path: export_templates_linux.zip


      - name: Upload Windows templates
        uses: actions/upload-artifact@v4
        with:
          name: windows-templates
          path: export_templates_windows.zip
